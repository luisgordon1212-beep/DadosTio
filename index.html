<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juego de Dados del Toji</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <h1>🎲 ¡Lanza los Dados de Toji! 🎲</h1>
        
        <!-- Menú de selección -->
        <div class="selector-container">
            <select id="dice-selector" class="custom-select">
                <option value="1">1 DADO</option>
                <option value="2">2 DADOS</option>
                <option value="3">3 DADOS</option>
                <option value="4" selected>4 DADOS</option>
            </select>
        </div>
        
        <div class="dice-grid">
            <div id="wrapper-1" class="dice-wrapper">
                <div id="status-1" class="roll-status">ROLLING...</div>
                <div id="dice-1" class="dice azul">●</div>
            </div>
            <div id="wrapper-2" class="dice-wrapper">
                <div id="status-2" class="roll-status">ROLLING...</div>
                <div id="dice-2" class="dice amarillo">●</div>
            </div>
            <div id="wrapper-3" class="dice-wrapper">
                <div id="status-3" class="roll-status">ROLLING...</div>
                <div id="dice-3" class="dice verde">●</div>
            </div>
            <div id="wrapper-4" class="dice-wrapper">
                <div id="status-4" class="roll-status">ROLLING...</div>
                <div id="dice-4" class="dice morado">●</div>
            </div>
        </div>

        <button id="roll-btn">Tirar Dados</button>

        <!-- --- NUEVA SECCIÓN: TABLERO DE ESTADÍSTICAS --- -->
        <div class="stats-container">
            <h3>📊 Contador de Colores</h3>
            <div class="stats-grid">
                <div class="stat-item s-azul">Azul: <span id="count-azul">0</span></div>
                <div class="stat-item s-amarillo">Amarillo: <span id="count-amarillo">0</span></div>
                <div class="stat-item s-verde">Verde: <span id="count-verde">0</span></div>
                <div class="stat-item s-morado">Morado: <span id="count-morado">0</span></div>
                <div class="stat-item s-naranja">Naranja: <span id="count-naranja">0</span></div>
                <div class="stat-item s-rojo">Rojo: <span id="count-rojo">0</span></div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
