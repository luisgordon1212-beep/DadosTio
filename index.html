<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toji's Dice Game</title>
    <style>
        /* ==========================================================================
           1. CONFIGURACIÓN GLOBAL Y FONDO DE LA PÁGINA
           ========================================================================== */
        body {
            font-family: 'Impact', 'Arial Black', sans-serif;
            background-color: #0b1a14; 
            background-image: url('image_27b01f.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            color: #ffffff;
        }

        /* ==========================================================================
           2. CONTENEDOR PRINCIPAL DEL JUEGO (GAME INTERFACE)
           ========================================================================== */
        .game-container {
            text-align: center;
            background: linear-gradient(135deg, rgba(16, 38, 28, 0.95), rgba(8, 20, 15, 0.95));
            padding: 30px;
            border-radius: 25px;
            box-shadow: 0 0 25px rgba(46, 204, 113, 0.3), inset 0 0 15px rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 2px solid #2ecc71;
            max-width: 400px;
            width: 100%;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        h1 {
            color: #2ecc71;
            text-shadow: 0 0 12px rgba(46, 204, 113, 0.6);
            font-size: 1.8rem;
            margin-top: 0;
            margin-bottom: 20px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* ==========================================================================
           3. MENU DESPLEGABLE (DICE SELECTOR)
           ========================================================================== */
        .selector-container {
            margin-bottom: 25px;
            width: 100%;
            display: flex;
            justify-content: center;
        }

        .custom-select {
            background-color: #11251c;
            color: #2ecc71;
            font-size: 1.1rem;
            font-weight: bold;
            padding: 10px 20px;
            border: 2px solid #2ecc71;
            border-radius: 12px;
            cursor: pointer;
            outline: none;
            width: 160px;
            text-align: center;
            box-shadow: 0 0 10px rgba(46, 204, 113, 0.2);
            font-family: inherit;
            letter-spacing: 1px;
            transition: background-color 0.2s, box-shadow 0.2s;
        }

        .custom-select:hover {
            background-color: #163024;
            box-shadow: 0 0 15px rgba(46, 204, 113, 0.4);
        }

        /* ==========================================================================
           4. ZONA DE DADOS Y ANIMACIONES (DICE GRID)
           ========================================================================== */
        .dice-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px; 
            margin: 20px auto;
            width: 100%;
        }

        .dice-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            transition: transform 0.2s ease;
        }

        .dice-wrapper.hidden {
            display: none !important;
        }

        .roll-status {
            font-size: 0.9rem; 
            font-weight: bold;
            color: #3498db;
            text-shadow: 0 0 10px rgba(52, 152, 219, 0.9);
            margin-bottom: 8px;
            opacity: 0; 
            height: 18px;
            transition: opacity 0.2s ease;
            letter-spacing: 1px;
        }

        .roll-status.active {
            opacity: 1;
            animation: parpadeo 0.4s infinite alternate;
        }

        .dice {
            font-size: 3.5rem; 
            width: 90px;
            height: 90px;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 5px solid #ffffff; 
            border-radius: 20px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.6);
            box-sizing: border-box;
            transition: transform 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.3s ease;
        }

        .dice.spinning {
            animation: giro-loco 0.25s infinite linear;
        }

        /* ==========================================================================
           5. ESTILOS NEÓN PARA CADA COLOR INDIVIDUAL DE DADO
           ========================================================================== */
        .dice.azul { background-color: #2980b9; color: #ffffff; box-shadow: 0 0 15px rgba(41, 128, 185, 0.7), 0 8px 20px rgba(0, 0, 0, 0.5); }
        .dice.amarillo { background-color: #f1c40f; color: #ffffff; box-shadow: 0 0 15px rgba(241, 196, 15, 0.7), 0 8px 20px rgba(0, 0, 0, 0.5); }
        .dice.verde { background-color: #27ae60; color: #ffffff; box-shadow: 0 0 15px rgba(39, 174, 96, 0.7), 0 8px 20px rgba(0, 0, 0, 0.5); }
        .dice.morado { background-color: #8e44ad; color: #ffffff; box-shadow: 0 0 15px rgba(142, 68, 173, 0.7), 0 8px 20px rgba(0, 0, 0, 0.5); }
        .dice.naranja { background-color: #d35400; color: #ffffff; box-shadow: 0 0 15px rgba(211, 84, 0, 0.7), 0 8px 20px rgba(0, 0, 0, 0.5); }
        .dice.rojo { background-color: #c0392b; color: #ffffff; box-shadow: 0 0 15px rgba(192, 57, 43, 0.7), 0 8px 20px rgba(0, 0, 0, 0.5); }

        /* ==========================================================================
           6. SECCIÓN DE LOGROS / COMBO TITLES
           ========================================================================== */
        .achievement-text {
            font-size: 1.1rem;
            font-weight: bold;
            color: #f1c40f;
            text-shadow: 0 0 10px rgba(241, 196, 15, 0.5);
            margin-top: 20px;
            margin-bottom: 20px;
            min-height: 24px;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: all 0.3s ease;
            width: 100%;
        }

        .achievement-pop {
            animation: pop-efecto 0.3s ease-out forwards;
        }

        /* ==========================================================================
           7. BOTÓN DE LANZAMIENTO (ROLL DICE BUTTON)
           ========================================================================== */
        button {
            background: linear-gradient(90deg, #2ecc71, #27ae60);
            color: #ffffff;
            border: none;
            padding: 12px 35px;
            font-size: 1.2rem;
            border-radius: 12px;
            cursor: pointer;
            margin-top: 5px;
            margin-bottom: 10px;
            font-weight: bold;
            font-family: inherit;
            box-shadow: 0 0 15px rgba(46, 204, 113, 0.4);
            transition: all 0.2s ease;
            animation: pulso-boton 2s infinite;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button:hover {
            background: linear-gradient(90deg, #27ae60, #219653);
            box-shadow: 0 0 25px rgba(46, 204, 113, 0.8);
            transform: translateY(-2px);
        }

        button:disabled {
            background: #555555 !important;
            box-shadow: none !important;
            cursor: not-allowed;
            opacity: 0.6;
            animation: none;
            transform: none;
        }

        /* ==========================================================================
           8. TABLERO DE ESTADÍSTICAS ABAJO (COLOR TRACKER)
           ========================================================================== */
        .stats-container {
            margin-top: 25px;
            padding-top: 20px;
            border-top: 2px dashed rgba(46, 204, 113, 0.3);
            text-align: left;
            width: 100%;
        }

        .stats-container h3 {
            margin: 0 0 15px 0;
            font-size: 1.2rem;
            color: #2ecc71;
            text-align: center;
            text-shadow: 0 0 8px rgba(46, 204, 113, 0.4);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            width: 100%;
        }

        .stat-item {
            background-color: rgba(17, 37, 28, 0.6);
            padding: 8px 15px;
            border-radius: 8px;
            font-size: 0.95rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-sizing: border-box;
        }

        .stat-item.s-azul { border-left: 5px solid #2980b9; }
        .stat-item.s-amarillo { border-left: 5px solid #f1c40f; }
        .stat-item.s-verde { border-left: 5px solid #27ae60; }
        .stat-item.s-morado { border-left: 5px solid #8e44ad; }
        .stat-item.s-naranja { border-left: 5px solid #d35400; }
        .stat-item.s-rojo { border-left: 5px solid #c0392b; }

        .stat-item span {
            color: #2ecc71;
            font-size: 1.1rem;
            font-weight: bold;
        }

        /* ==========================================================================
           9. DECLARACIÓN DE ANIMACIONES KEYFRAMES
           ========================================================================== */
        @keyframes giro-loco {
            0% { transform: rotate(0deg) scale(1); }
            50% { transform: rotate(180deg) scale(1.1); }
            100% { transform: rotate(360deg) scale(1); }
        }

        @keyframes parpadeo {
            from { opacity: 0.3; }
            to { opacity: 1; }
        }

        @keyframes pulso-boton {
            0% { box-shadow: 0 0 15px rgba(46, 204, 113, 0.4); }
            50% { box-shadow: 0 0 25px rgba(46, 204, 113, 0.8); }
            100% { box-shadow: 0 0 15px rgba(46, 204, 113, 0.4); }
        }

        @keyframes pop-efecto {
            0% { transform: scale(0.8); opacity: 0; }
            50% { transform: scale(1.15); }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🎲 Roll Toji's Dice! 🎲</h1>
        
        <div class="selector-container">
            <select id="dice-selector" class="custom-select">
                <option value="1">1 DICE</option>
                <option value="2">2 DICE</option>
                <option value="3">3 DICE</option>
                <option value="4" selected>4 DICE</option>
            </select>
        </div>
        
        <div class="dice-grid">
            <div id="wrapper-1" class="dice-wrapper">
                <div id="status-1" class="roll-status">ROLLING...</div>
                <div id="dice-1" class="dice azul">●</div>
            </div>
            <div id="wrapper-2" class="dice-wrapper">
                <div id="status-2" class="roll-status">ROLLING...</div>
                <div id="dice-2" class="dice amarillo">●</div>
            </div>
            <div id="wrapper-3" class="dice-wrapper">
                <div id="status-3" class="roll-status">ROLLING...</div>
                <div id="dice-3" class="dice verde">●</div>
            </div>
            <div id="wrapper-4" class="dice-wrapper">
                <div id="status-4" class="roll-status">ROLLING...</div>
                <div id="dice-4" class="dice morado">●</div>
            </div>
        </div>

        <div id="achievement-box" class="achievement-text">Press Roll to start!</div>

        <button id="roll-btn">Roll Dice</button>

        <div class="stats-container">
            <h3>📊 Color Tracker</h3>
            <div class="stats-grid">
                <div class="stat-item s-azul">Blue: <span id="count-azul">0</span></div>
                <div class="stat-item s-amarillo">Yellow: <span id="count-amarillo">0</span></div>
                <div class="stat-item s-verde">Green: <span id="count-verde">0</span></div>
                <div class="stat-item s-morado">Purple: <span id="count-morado">0</span></div>
                <div class="stat-item s-naranja">Orange: <span id="count-naranja">0</span></div>
                <div class="stat-item s-rojo">Red: <span id="count-rojo">0</span></div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
