<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juego de Dados del Toji</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <h1>🎲 ¡Lanza los Dados de Toji! 🎲</h1>
        
        <div class="dice-container">
            <!-- Iniciamos los dados con el caracter del punto clásico de dado -->
            <div id="dice-1" class="dice azul">●</div>
            <div id="dice-2" class="dice amarillo">●</div>
            <div id="dice-3" class="dice verde">●</div>
            <div id="dice-4" class="dice morado">●</div>
        </div>

        <button id="roll-btn">Tirar Dados</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
