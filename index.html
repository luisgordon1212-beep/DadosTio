<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toji's Dice Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <h1>🎲 Roll Toji's Dice! 🎲</h1>
        
        <div class="selector-container">
            <select id="dice-selector" class="custom-select">
                <option value="1">1 DICE</option>
                <option value="2">2 DICE</option>
                <option value="3">3 DICE</option>
                <option value="4" selected>4 DICE</option>
            </select>
        </div>
        
        <div class="dice-grid">
            <div id="wrapper-1" class="dice-wrapper">
                <div id="status-1" class="roll-status">ROLLING...</div>
                <div id="dice-1" class="dice azul">●</div>
            </div>
            <div id="wrapper-2" class="dice-wrapper">
                <div id="status-2" class="roll-status">ROLLING...</div>
                <div id="dice-2" class="dice amarillo">●</div>
            </div>
            <div id="wrapper-3" class="dice-wrapper">
                <div id="status-3" class="roll-status">ROLLING...</div>
                <div id="dice-3" class="dice verde">●</div>
            </div>
            <div id="wrapper-4" class="dice-wrapper">
                <div id="status-4" class="roll-status">ROLLING...</div>
                <div id="dice-4" class="dice morado">●</div>
            </div>
        </div>

        <div id="achievement-box" class="achievement-text">Press Roll to start!</div>

        <button id="roll-btn">Roll Dice</button>

        <div class="stats-container">
            <h3>📊 Color Tracker</h3>
            <div class="stats-grid">
                <div class="stat-item s-azul">Blue: <span id="count-azul">0</span></div>
                <div class="stat-item s-amarillo">Yellow: <span id="count-amarillo">0</span></div>
                <div class="stat-item s-verde">Green: <span id="count-verde">0</span></div>
                <div class="stat-item s-morado">Purple: <span id="count-morado">0</span></div>
                <div class="stat-item s-naranja">Orange: <span id="count-naranja">0</span></div>
                <div class="stat-item s-rojo">Red: <span id="count-rojo">0</span></div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
