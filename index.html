<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juego de Dados Online</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <h1>🎲 ¡Lanza los Dados de Toji! 🎲</h1>
        
        <!-- Los 4 dados vuelven a iniciar con el número 1 -->
        <div class="dice-container">
            <div id="dice-1" class="dice azul">1</div>
            <div id="dice-2" class="dice amarillo">1</div>
            <div id="dice-3" class="dice verde">1</div>
            <div id="dice-4" class="dice morado">1</div>
        </div>

        <button id="roll-btn">Tirar Dados</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
