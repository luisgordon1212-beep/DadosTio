<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toji's Dice Game - Ultra HD</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;800;900&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
    
    <style>
        /* ==========================================================================
           1. CONFIGURACIÓN GLOBAL Y OPTIMIZACIÓN DE IMAGEN
           ========================================================================== */
        *, *::before, *::after {
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased; /* Suavizado de fuentes en Mac/iOS */
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            font-family: 'Rajdhani', sans-serif;
            background-color: #050c09; 
            background-image: url('image_27b01f.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 24px;
            color: #ffffff;
            /* Fuerza al navegador a usar el motor de renderizado de más alta calidad */
            image-rendering: high-quality;
        }

        /* ==========================================================================
           2. INTERFAZ DE CRISTAL PREMIUM (GAME CONTAINER)
           ========================================================================== */
        .game-container {
            text-align: center;
            background: linear-gradient(135deg, rgba(10, 26, 19, 0.93), rgba(4, 12, 9, 0.97));
            padding: 35px 25px;
            border-radius: 24px;
            /* Triple capa de sombra para un efecto de profundidad hiperrealista */
            box-shadow: 
                0 20px 50px rgba(0, 0, 0, 0.8),
                0 0 30px rgba(46, 204, 113, 0.15),
                inset 0 1px 1px rgba(255, 255, 255, 0.1); /* Reflejo de cristal en el borde */
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1.5px solid rgba(46, 204, 113, 0.4);
            max-width: 420px;
            width: 100%;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            color: #00ff66; /* Verde Neón Puro */
            /* Efecto Cyberpunk nítido */
            text-shadow: 
                0 0 4px rgba(0, 255, 102, 0.3),
                0 0 12px rgba(0, 255, 102, 0.5),
                0 0 30px rgba(0, 255, 102, 0.2);
            font-size: 1.6rem;
            margin-top: 0;
            margin-bottom: 25px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        /* ==========================================================================
           3. SELECTOR MODERNO
           ========================================================================== */
        .selector-container {
            margin-bottom: 30px;
            display: flex;
            justify-content: center;
        }

        .custom-select {
            background-color: rgba(5, 15, 10, 0.8);
            color: #00ff66;
            font-family: 'Orbitron', sans-serif;
            font-size: 1rem;
            font-weight: 800;
            padding: 12px 24px;
            border: 1.5px solid rgba(0, 255, 102, 0.5);
            border-radius: 12px;
            cursor: pointer;
            outline: none;
            width: 170px;
            text-align: center;
            letter-spacing: 1px;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.4);
        }

        .custom-select:hover, .custom-select:focus {
            border-color: #00ff66;
            background-color: rgba(10, 30, 20, 0.9);
            box-shadow: 0 0 15px rgba(0, 255, 102, 0.3);
        }

        /* ==========================================================================
           4. CUADRÍCULA DE DADOS HD
           ========================================================================== */
        .dice-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 25px; 
            margin: 25px auto;
            width: 100%;
        }

        .dice-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        .dice-wrapper.hidden {
            display: none !important;
        }

        .roll-status {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.85rem; 
            font-weight: 500;
            color: #00d2ff;
            text-shadow: 0 0 8px rgba(0, 210, 255, 0.6);
            margin-bottom: 8px;
            opacity: 0; 
            height: 18px;
            letter-spacing: 1px;
        }

        .roll-status.active {
            opacity: 1;
            animation: parpadeo-hd 0.5s infinite alternate ease-in-out;
        }

        /* Diseño de los Dados de Toji en Alta Resolución */
        .dice {
            font-size: 3.8rem; 
            width: 95px;
            height: 95px;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 4px solid #ffffff; 
            border-radius: 22px;
            background-clip: padding-box;
            box-sizing: border-box;
            /* Suaviza los movimientos de escala en pantallas de 144Hz o más */
            transition: transform 0.15s cubic-bezier(0.25, 1, 0.5, 1), box-shadow 0.3s ease;
        }

        /* Animación ultra fluida */
        .dice.spinning {
            animation: giro-ultra-fluido 0.22s infinite linear;
        }

        /* ==========================================================================
           5. PALETA NEÓN HD (Doble capa de brillo)
           ========================================================================== */
        .dice.azul { background-color: #1a73e8; color: #ffffff; box-shadow: 0 0 5px rgba(26,115,232,0.5), 0 0 20px rgba(26,115,232,0.4), 0 10px 20px rgba(0,0,0,0.5); }
        .dice.amarillo { background-color: #ffcc00; color: #ffffff; box-shadow: 0 0 5px rgba(255,204,0,0.5), 0 0 20px rgba(255,204,0,0.4), 0 10px 20px rgba(0,0,0,0.5); }
        .dice.verde { background-color: #00cc66; color: #ffffff; box-shadow: 0 0 5px rgba(0,204,102,0.5), 0 0 20px rgba(0,204,102,0.4), 0 10px 20px rgba(0,0,0,0.5); }
        .dice.morado { background-color: #b300ff; color: #ffffff; box-shadow: 0 0 5px rgba(179,0,255,0.5), 0 0 20px rgba(179,0,255,0.4), 0 10px 20px rgba(0,0,0,0.5); }
        .dice.naranja { background-color: #ff6600; color: #ffffff; box-shadow: 0 0 5px rgba(255,102,0,0.5), 0 0 20px rgba(255,102,0,0.4), 0 10px 20px rgba(0,0,0,0.5); }
        .dice.rojo { background-color: #ff3333; color: #ffffff; box-shadow: 0 0 5px rgba(255,51,51,0.5), 0 0 20px rgba(255,51,51,0.4), 0 10px 20px rgba(0,0,0,0.5); }

        /* ==========================================================================
           6. SECCIÓN DE LOGROS MEJORADA
           ========================================================================== */
        .achievement-text {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.1rem;
            font-weight: 800;
            color: #ffcc00;
            text-shadow: 0 0 8px rgba(255, 204, 0, 0.4);
            margin: 22px 0;
            min-height: 24px;
            letter-spacing: 1.2px;
            text-transform: uppercase;
            width: 100%;
        }

        .achievement-pop {
            animation: impacto-pop 0.35s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        /* ==========================================================================
           7. BOTÓN DE LANZAMIENTO HIPER-ESTILIZADO
           ========================================================================== */
        button {
            background: linear-gradient(90deg, #00ff66, #00aa44);
            color: #ffffff;
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            border: none;
            padding: 14px 40px;
            font-size: 1.15rem;
            border-radius: 14px;
            cursor: pointer;
            margin-top: 5px;
            margin-bottom: 10px;
            box-shadow: 0 0 15px rgba(0, 255, 102, 0.3), 0 5px 15px rgba(0, 0, 0, 0.3);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            animation: pulso-neon 2.5s infinite ease-in-out;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button:hover {
            background: linear-gradient(90deg, #11ff77, #00cc55);
            box-shadow: 0 0 25px rgba(0, 255, 102, 0.6), 0 8px 20px rgba(0, 0, 0, 0.4);
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(1px);
        }

        button:disabled {
            background: #222222 !important;
            color: #666666 !important;
            border: 1px solid #333333 !important;
            box-shadow: none !important;
            cursor: not-allowed;
            opacity: 0.5;
            animation: none;
            transform: none;
        }

        /* ==========================================================================
           8. TABLERO DE ESTADÍSTICAS EN ALTA DENSIDAD
           ========================================================================== */
        .stats-container {
            margin-top: 30px;
            padding-top: 25px;
            border-top: 1px solid rgba(0, 255, 102, 0.2);
            text-align: left;
            width: 100%;
        }

        .stats-container h3 {
            font-family: 'Orbitron', sans-serif;
            margin: 0 0 20px 0;
            font-size: 1.1rem;
            font-weight: 800;
            color: #00ff66;
            text-align: center;
            text-shadow: 0 0 8px rgba(0, 255, 102, 0.3);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            width: 100%;
        }
